name: AI Keyword Pages Stable

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate AI page
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e

          # -----------------------------
          # Get page number
          # -----------------------------
          LAST=$(ls -d page* 2>/dev/null | sed 's/page//' | sort -n | tail -n 1)
          if [ -z "$LAST" ]; then NEXT=1; else NEXT=$((LAST+1)); fi

          mkdir -p page$NEXT

          echo "Generating keywords..."

          # -----------------------------
          # STEP 1: GET KEYWORDS
          # -----------------------------
          KEYWORD_RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"Return 5 SEO keywords separated ONLY by commas. No explanation. Example: coffee tips, travel hacks, money saving ideas, tech gadgets, productivity tips\"
                }]
              }]
            }" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "Raw keyword response:"
          echo "$KEYWORD_RESPONSE"

          # Extract keywords safely
          KEYWORDS=$(echo "$KEYWORD_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          # -----------------------------
          # FALLBACK if empty
          # -----------------------------
          if [ -z "$KEYWORDS" ]; then
            echo "Keyword generation failed, using fallback"
            KEYWORDS="coffee brewing tips, money saving tips, travel hacks, tech gadgets, productivity tips"
          fi

          echo "Keywords: $KEYWORDS"

          # Pick first keyword
          KEYWORD=$(echo "$KEYWORDS" | cut -d',' -f1 | xargs)

          # Final fallback safety
          if [ -z "$KEYWORD" ]; then
            KEYWORD="coffee brewing tips"
          fi

          echo "Selected keyword: $KEYWORD"

          # -----------------------------
          # STEP 2: GENERATE PAGE
          # -----------------------------
          PROMPT="Return ONLY valid HTML. No markdown, no explanation. Create a full SEO-friendly webpage about: $KEYWORD"

          PAGE_RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"$PROMPT\"
                }]
              }]
            }" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "Raw page response:"
          echo "$PAGE_RESPONSE"

          HTML=$(echo "$PAGE_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          # -----------------------------
          # FINAL FALLBACK
          # -----------------------------
          if [ -z "$HTML" ]; then
            HTML="<!DOCTYPE html><html><body><h1>Generation failed</h1><p>$KEYWORD</p></body></html>"
          fi

          # Save page
          echo "$HTML" > page$NEXT/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "AI page $(date)" || echo "No changes"
          git push origin HEAD:main
