name: Generate AI pages every 10 minutes

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate page with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e

          # Find next page number
          LAST_PAGE=$(find . -maxdepth 1 -type d -name 'page*' | sed 's|^\./page||' | sort -n | tail -n 1)

          if [ -z "$LAST_PAGE" ]; then
            NEXT_PAGE=1
          else
            NEXT_PAGE=$((LAST_PAGE + 1))
          fi

          echo "Creating page$NEXT_PAGE"
          mkdir -p "page$NEXT_PAGE"

          PROMPT='Return ONLY raw HTML. No markdown, no explanation. Create a full valid HTML5 page with <html>, <head>, and <body>. Topic: a useful everyday subject.'

          RESPONSE=$(curl -s \
            -X POST \
            -H 'Content-Type: application/json' \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "$(jq -n --arg text "$PROMPT" '{
              contents: [
                {
                  parts: [
                    { text: $text }
                  ]
                }
              ]
            }')" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent")

          echo "Raw API response:"
          echo "$RESPONSE"

          HTML=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$HTML" ]; then
            echo "Gemini failed, using fallback HTML"
            HTML='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Error</title></head><body><h1>Error generating content</h1></body></html>'
          fi

          printf '%s\n' "$HTML" > "page$NEXT_PAGE/index.html"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Add AI page $(date)" || echo "No changes"
          git push origin HEAD:main
