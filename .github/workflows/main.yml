name: AI SEO Site Builder

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GEMINI_MODEL: gemini-2.5-flash-lite
      SITE_BASE: https://timmit147.github.io/automation

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup data
        run: |
          mkdir -p data
          echo '{"niche":"gaming-mice","products":[],"pages":[]}' > data/content.json

      - name: Generate AI JSON
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="Return ONLY JSON with products and pages. No markdown."

          RESPONSE=$(curl -sS \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "$(jq -n --arg text "$PROMPT" '{contents:[{parts:[{text:$text}]}]}')" \
            "https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent")

          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > data/content.json

      - name: Generate pages
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DATA=$(cat data/content.json)

          echo "$DATA" | jq -c '.pages[]' | while read page; do
            SLUG=$(echo "$page" | jq -r '.slug')

            PROMPT="Write a simple HTML product page. Return ONLY HTML."

            RESPONSE=$(curl -sS \
              -H "Content-Type: application/json" \
              -H "x-goog-api-key: $GEMINI_API_KEY" \
              -d "$(jq -n --arg text "$PROMPT" '{contents:[{parts:[{text:$text}]}]}')" \
              "https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent")

            echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > "${SLUG}.html"
          done

      - name: Build index
        run: |
          echo "<html><body><h1>Affiliate Hub</h1>" > index.html

          for f in *.html; do
            [ "$f" = "index.html" ] && continue
            echo "<a href='$f'>$f</a><br>" >> index.html
          done

          echo "</body></html>" >> index.html

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "update" || echo "no changes"
          git push
