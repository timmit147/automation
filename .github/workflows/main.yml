name: Affiliate Page Generator

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate affiliate page
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          echo "Loading product..."

          PRODUCT=$(jq -c '.products[0]' data/products.json)
          NAME=$(echo "$PRODUCT" | jq -r '.name')
          LINK=$(echo "$PRODUCT" | jq -r '.link')

          echo "Product: $NAME"

          # remove used product
          jq 'del(.products[0])' data/products.json > tmp.json
          mv tmp.json data/products.json

          # page number
          NEXT=$(find . -maxdepth 1 -type d -name "page*" | sed 's|./page||' | sort -n | tail -n 1)
          if [ -z "$NEXT" ]; then NEXT=1; else NEXT=$((NEXT + 1)); fi

          mkdir -p "page$NEXT"

          # simple prompt (NO HERE DOCS → avoids YAML breakage)
          PROMPT="Write ONLY HTML. No markdown.

          Product: $NAME
          Affiliate link: $LINK

          Create SEO review page with:
          - title
          - H1
          - overview
          - pros and cons
          - FAQ
          - CTA button linking to affiliate link"

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent")

          HTML=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$HTML" ]; then
            HTML="<!DOCTYPE html><html><head><title>$NAME</title></head><body><h1>$NAME</h1><a href='$LINK'>Buy</a></body></html>"
          fi

          echo "$HTML" > "page$NEXT/index.html"

          # rebuild index
          echo "<h1>Affiliate Pages</h1><ul>" > index.html

          for d in page*; do
            if [ -d "$d" ]; then
              TITLE=$(grep -o '<title>[^<]*' "$d/index.html" 2>/dev/null | head -n 1 | sed 's/<title>//' || true)
              [ -z "$TITLE" ] && TITLE="$d"
              echo "<li><a href='$d/'>$TITLE</a></li>" >> index.html
            fi
          done

          echo "</ul>" >> index.html

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Generate affiliate page" || echo "No changes"
          git push
