name: Generate pages every 10 minutes

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create new page folder with index.html
        run: |
          # Get latest page number
          LAST_PAGE=$(ls -d page* 2>/dev/null | sed 's/page//' | sort -n | tail -n 1)

          # Start at 1 if none exist
          if [ -z "$LAST_PAGE" ]; then
            NEXT_PAGE=1
          else
            NEXT_PAGE=$((LAST_PAGE + 1))
          fi

          echo "Creating page$NEXT_PAGE"

          mkdir -p page$NEXT_PAGE

          cat <<EOF > page$NEXT_PAGE/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Page $NEXT_PAGE</title>
          </head>
          <body>
            <h1>This is page $NEXT_PAGE</h1>
            <p>Generated at $(date)</p>
          </body>
          </html>
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Add page $(date)" || echo "No changes to commit"
          git push origin HEAD:main
