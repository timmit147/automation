name: AI Keyword Pages

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate keyword + page
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e

          # Get page number
          LAST=$(ls -d page* 2>/dev/null | sed 's/page//' | sort -n | tail -n 1)
          if [ -z "$LAST" ]; then NEXT=1; else NEXT=$((LAST+1)); fi

          mkdir -p page$NEXT

          echo "Generating keywords..."

          KEYWORD_RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"Give me 5 trending low-competition SEO keywords for today. Focus on practical, money, tech, travel or daily life topics. Return only a comma-separated list.\"
                }]
              }]
            }" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          KEYWORDS=$(echo "$KEYWORD_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          echo "Keywords: $KEYWORDS"

          # pick first keyword (simple start)
          KEYWORD=$(echo "$KEYWORDS" | cut -d',' -f1)

          echo "Selected keyword: $KEYWORD"

          PROMPT="Return ONLY raw HTML. Create a full SEO-friendly webpage about: $KEYWORD. No markdown."

          PAGE=$(curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"$PROMPT\"
                }]
              }]
            }" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          HTML=$(echo "$PAGE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$HTML" ]; then
            HTML="<html><body><h1>Generation failed</h1></body></html>"
          fi

          echo "$HTML" > page$NEXT/index.html

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "AI page $(date)" || echo "no changes"
          git push origin HEAD:main
