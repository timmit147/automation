name: AI SEO Site Generator

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GEMINI_MODEL: gemini-2.5-flash-lite
      SITE_BASE: https://timmit147.github.io/automation

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate pages and site files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          call_gemini() {
            local payload="$1"
            local response=""
            local attempt=1

            while [ "$attempt" -le 3 ]; do
              response="$(curl -sS -X POST \
                -H "Content-Type: application/json" \
                -H "x-goog-api-key: ${GEMINI_API_KEY}" \
                -d "$payload" \
                "https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent" || true)"

              if [ -n "$response" ]; then
                local text
                text="$(echo "$response" | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null || true)"
                if [ -n "$text" ]; then
                  printf '%s' "$response"
                  return 0
                fi
              fi

              echo "Gemini attempt ${attempt} failed, retrying..."
              sleep $((attempt * 2))
              attempt=$((attempt + 1))
            done

            printf '%s' "$response"
            return 1
          }

          LAST="$(find . -maxdepth 1 -type d -name 'page*' | sed 's|^\./page||' | sort -n | tail -n 1 || true)"
          if [ -z "${LAST:-}" ]; then
            NEXT=1
          else
            NEXT=$((LAST + 1))
          fi

          echo "Creating page${NEXT}"
          mkdir -p "page${NEXT}"

          RELATED_TEXT=""
          for dir in $(find . -maxdepth 1 -type d -name 'page*' | sed 's|^\./||' | sort -V | tail -n 3); do
            title="$(grep -o '<title>[^<]*' "${dir}/index.html" 2>/dev/null | head -n 1 | sed 's/<title>//' || true)"
            if [ -z "$title" ]; then
              title="$dir"
            fi
            RELATED_TEXT="${RELATED_TEXT}- ${title} -> /${dir}/"$'\n'
          done

          if [ -z "$RELATED_TEXT" ]; then
            RELATED_TEXT="- Home -> /"$'\n'
          fi

          KEYWORD_PROMPT="Generate 5 high-intent SEO money keywords. Must be specific, low competition, and include words like best, free, cheap, for students, for freelancers, under 10 euro. Return comma-separated only."
          KEYWORD_PAYLOAD="$(jq -n --arg text "$KEYWORD_PROMPT" '{
            contents: [
              {
                parts: [
                  { text: $text }
                ]
              }
            ]
          }')"

          KEYWORD_RESPONSE="$(call_gemini "$KEYWORD_PAYLOAD" || true)"
          echo "Raw keyword response:"
          echo "$KEYWORD_RESPONSE"

          KEYWORDS="$(echo "$KEYWORD_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null || true)"
          if [ -z "$KEYWORDS" ]; then
            KEYWORDS="best cheap CRM for freelancers under 10 euro,best free invoice generator for freelancers,best productivity app for students under 10 euro,cheap website builder for students under 10 euro monthly,best free stock photos for freelancers commercial use"
          fi

          KEYWORD="$(echo "$KEYWORDS" | cut -d',' -f1 | xargs)"
          if [ -z "$KEYWORD" ]; then
            KEYWORD="best cheap CRM for freelancers under 10 euro"
          fi

          echo "Keyword: $KEYWORD"

          PAGE_PROMPT="Return ONLY valid HTML. No markdown, no backticks, no explanation. Start with <!DOCTYPE html>. Create a full SEO blog post about: '$KEYWORD'. Include a title tag, meta description, one H1, helpful H2 sections, practical tips, FAQs, a section called Recommended Tools with 3 items, and a section called Related pages using these links if relevant:
          ${RELATED_TEXT}
          Use clean semantic HTML and make the page look like a real article."

          PAGE_PAYLOAD="$(jq -n --arg text "$PAGE_PROMPT" '{
            contents: [
              {
                parts: [
                  { text: $text }
                ]
              }
            ]
          }')"

          PAGE_RESPONSE="$(call_gemini "$PAGE_PAYLOAD" || true)"
          echo "Raw page response:"
          echo "$PAGE_RESPONSE"

          HTML="$(echo "$PAGE_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null || true)"
          if [ -z "$HTML" ]; then
            HTML='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Generation failed</title><meta name="description" content="Fallback page"></head><body><h1>Generation failed</h1><p>Fallback page</p></body></html>'
          fi

          printf '%s\n' "$HTML" > "page${NEXT}/index.html"

          if ! grep -qi 'related pages' "page${NEXT}/index.html"; then
            {
              printf '\n<section>\n'
              printf '  <h2>Related pages</h2>\n'
              printf '  <ul>\n'
              printf '    <li><a href="/">Home</a></li>\n'
              for dir in $(find . -maxdepth 1 -type d -name 'page*' | sed 's|^\./||' | sort -V | tail -n 3); do
                if [ "$dir" != "page${NEXT}" ]; then
                  title="$(grep -o '<title>[^<]*' "${dir}/index.html" 2>/dev/null | head -n 1 | sed 's/<title>//' || true)"
                  if [ -z "$title" ]; then
                    title="$dir"
                  fi
                  printf '    <li><a href="/%s/">%s</a></li>\n' "$dir" "$title"
                fi
              done
              printf '  </ul>\n'
              printf '</section>\n'
            } >> "page${NEXT}/index.html"
          fi

          {
            printf '%s\n' '<!DOCTYPE html>'
            printf '%s\n' '<html lang="en">'
            printf '%s\n' '<head>'
            printf '%s\n' '  <meta charset="UTF-8">'
            printf '%s\n' '  <meta name="viewport" content="width=device-width, initial-scale=1.0">'
            printf '%s\n' '  <title>AI SEO Blog</title>'
            printf '%s\n' '  <meta name="description" content="Automatically generated SEO pages.">'
            printf '%s\n' '</head>'
            printf '%s\n' '<body>'
            printf '%s\n' '  <h1>AI Generated SEO Pages</h1>'
            printf '%s\n' '  <p>Automatically generated content hub.</p>'
            printf '%s\n' '  <ul>'
          } > index.html

          for dir in $(find . -maxdepth 1 -type d -name 'page*' | sed 's|^\./||' | sort -V); do
            title="$(grep -o '<title>[^<]*' "${dir}/index.html" 2>/dev/null | head -n 1 | sed 's/<title>//' || true)"
            if [ -z "$title" ]; then
              title="$dir"
            fi
            printf '    <li><a href="%s/">%s</a></li>\n' "$dir" "$title" >> index.html
          done

          {
            printf '%s\n' '  </ul>'
            printf '%s\n' '</body>'
            printf '%s\n' '</html>'
          } >> index.html

          printf '%s\n' 'User-agent: *' > robots.txt
          printf '%s\n' 'Allow: /' >> robots.txt
          printf '\nSitemap: %s/sitemap.xml\n' "$SITE_BASE" >> robots.txt

          {
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
            printf '%s\n' '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
            printf '  <url><loc>%s/</loc></url>\n' "$SITE_BASE"
            for dir in $(find . -maxdepth 1 -type d -name 'page*' | sed 's|^\./||' | sort -V); do
              printf '  <url><loc>%s/%s/</loc></url>\n' "$SITE_BASE" "$dir"
            done
            printf '%s\n' '</urlset>'
          } > sitemap.xml

          touch .nojekyll

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "AI SEO update $(date)" || echo "No changes"
          git push origin HEAD:main
