name: AI SEO Site Generator

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate page + index
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          # Find next page number
          LAST=$(find . -maxdepth 1 -type d -name 'page*' | sed 's|^\./page||' | sort -n | tail -n 1)
          if [ -z "${LAST:-}" ]; then
            NEXT=1
          else
            NEXT=$((LAST + 1))
          fi

          echo "Creating page${NEXT}"
          mkdir -p "page${NEXT}"

          # Ask Gemini for keyword ideas
          KEYWORD_RESPONSE=$(curl -fsS \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d "$(jq -n --arg text 'Generate 5 high-intent SEO money keywords. Must be specific, low competition, and include words like best, free, cheap, for students, for freelancers, under 10 euro. Return comma-separated only.' '{
              contents: [
                {
                  parts: [
                    { text: $text }
                  ]
                }
              ]
            }')" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent")

          echo "Raw keyword response:"
          echo "$KEYWORD_RESPONSE"

          KEYWORDS=$(echo "$KEYWORD_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$KEYWORDS" ]; then
            KEYWORDS="best free ai tools for students, cheap productivity tools under 10 euro, ai resume builder free europe, how to save money using ai, best side hustle tools"
          fi

          KEYWORD=$(echo "$KEYWORDS" | cut -d',' -f1 | xargs)
          if [ -z "$KEYWORD" ]; then
            KEYWORD="best free ai tools for students"
          fi

          echo "Keyword: $KEYWORD"

          # Generate the page HTML
          PAGE_RESPONSE=$(curl -fsS \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d "$(jq -n --arg text "Return ONLY valid HTML. No markdown, no backticks, no explanation. Start with <!DOCTYPE html> and create a full SEO blog post about: '$KEYWORD'. Include headings, practical tips, and a section called 'Recommended Tools'." '{
              contents: [
                {
                  parts: [
                    { text: $text }
                  ]
                }
              ]
            }')" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent")

          echo "Raw page response:"
          echo "$PAGE_RESPONSE"

          HTML=$(echo "$PAGE_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$HTML" ]; then
            HTML='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Generation failed</title></head><body><h1>Generation failed</h1><p>Fallback page</p></body></html>'
          fi

          printf '%s\n' "$HTML" > "page${NEXT}/index.html"

          # Build index.html automatically
          echo "Building index.html..."
          cat > index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>AI SEO Blog</title>
          </head>
          <body>
            <h1>AI Generated SEO Pages</h1>
            <p>Automatically generated content hub</p>
            <ul>
          EOF

          for dir in page*; do
            if [ -d "$dir" ]; then
              TITLE=$(grep -o '<title>[^<]*' "$dir/index.html" 2>/dev/null | head -n 1 | sed 's/<title>//' || true)
              if [ -z "$TITLE" ]; then
                TITLE="$dir"
              fi
              echo "  <li><a href=\"$dir/\">$TITLE</a></li>" >> index.html
            fi
          done

          cat >> index.html <<'EOF'
            </ul>
          </body>
          </html>
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "AI SEO update $(date)" || echo "No changes"
          git push origin HEAD:main
