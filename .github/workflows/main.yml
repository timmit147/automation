name: Generate AI pages every 10 minutes

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate page with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Find last page number
          LAST_PAGE=$(ls -d page* 2>/dev/null | sed 's/page//' | sort -n | tail -n 1)

          if [ -z "$LAST_PAGE" ]; then
            NEXT_PAGE=1
          else
            NEXT_PAGE=$((LAST_PAGE + 1))
          fi

          echo "Creating page$NEXT_PAGE"
          mkdir -p page$NEXT_PAGE

          # Prompt for Gemini
          PROMPT="Create a clean, simple SEO-friendly HTML page about a useful topic. Only return valid HTML, nothing else."

          # Call Gemini API
          RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GEMINI_API_KEY" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"$PROMPT\"
                }]
              }]
            }" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent")

          # Extract HTML
          HTML=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          # Fallback if API fails
          if [ -z "$HTML" ] || [ "$HTML" = "null" ]; then
            HTML="<html><body><h1>Error generating content</h1></body></html>"
          fi

          # Save file
          echo "$HTML" > page$NEXT_PAGE/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Add AI page $(date)" || echo "No changes"
          git push origin HEAD:main
