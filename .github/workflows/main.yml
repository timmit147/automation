name: AI Money Keyword Pages

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate money keyword + page
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e

          # -------------------------
          # Page numbering
          # -------------------------
          LAST=$(ls -d page* 2>/dev/null | sed 's/page//' | sort -n | tail -n 1)
          if [ -z "$LAST" ]; then NEXT=1; else NEXT=$((LAST+1)); fi

          mkdir -p page$NEXT

          echo "Generating MONEY keywords..."

          # -------------------------
          # STEP 1: MONEY KEYWORDS
          # -------------------------
          KEYWORD_RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"Generate 5 HIGH INTENT MONEY SEO keywords. Rules: must be low competition, specific, contain buyer intent (best, cheap, free, tools, under, for students, for freelancers). Focus on AI, money saving, productivity, side income, tech tools. Return ONLY comma-separated keywords.\"
                }]
              }]
            }" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "Raw keyword response:"
          echo "$KEYWORD_RESPONSE"

          KEYWORDS=$(echo "$KEYWORD_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          # fallback keywords (VERY IMPORTANT)
          if [ -z "$KEYWORDS" ]; then
            KEYWORDS="best free ai tools for students, cheap ai productivity tools under 10 euro, ai resume builder free europe, how to save time using ai tools, best side hustle tools with ai"
          fi

          echo "Keywords: $KEYWORDS"

          # pick first keyword
          KEYWORD=$(echo "$KEYWORDS" | cut -d',' -f1 | xargs)

          if [ -z "$KEYWORD" ]; then
            KEYWORD="best free ai tools for students"
          fi

          echo "Selected keyword: $KEYWORD"

          # -------------------------
          # STEP 2: GENERATE PAGE
          # -------------------------
          PROMPT="Return ONLY valid HTML. No markdown. No explanation. Create a highly useful SEO page targeting this keyword: '$KEYWORD'. Include headings, tips, and practical advice. Make it feel like a real blog post."

          PAGE_RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"$PROMPT\"
                }]
              }]
            }" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          HTML=$(echo "$PAGE_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$HTML" ]; then
            HTML="<!DOCTYPE html><html><body><h1>Generation failed</h1><p>$KEYWORD</p></body></html>"
          fi

          echo "$HTML" > page$NEXT/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Money page $(date)" || echo "No changes"
          git push origin HEAD:main
