name: Generate AI pages every 10 minutes

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate page with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Get next page number
          LAST_PAGE=$(ls -d page* 2>/dev/null | sed 's/page//' | sort -n | tail -n 1)

          if [ -z "$LAST_PAGE" ]; then
            NEXT_PAGE=1
          else
            NEXT_PAGE=$((LAST_PAGE + 1))
          fi

          echo "Creating page$NEXT_PAGE"
          mkdir -p page$NEXT_PAGE

          # Strong prompt (forces HTML only)
          PROMPT="Return ONLY raw HTML. No markdown, no explanation. Create a full valid HTML5 page with <html>, <head>, and <body>. Topic: a useful everyday subject."

          echo "Calling Gemini API..."

          RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"$PROMPT\"
                }]
              }]
            }" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "Raw API response:"
          echo "$RESPONSE"

          # Extract HTML safely
          HTML=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          # Fallback if API fails
          if [ -z "$HTML" ]; then
            echo "Gemini failed, using fallback HTML"
            HTML="<!DOCTYPE html><html><body><h1>Error generating content</h1></body></html>"
          fi

          # Save file
          echo "$HTML" > page$NEXT_PAGE/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Add AI page $(date)" || echo "No changes"
          git push origin HEAD:main
