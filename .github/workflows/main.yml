name: Affiliate Page Generator

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate product page and update queue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          # ----------------------------
          # 1. Get first product
          # ----------------------------
          PRODUCT=$(jq -c '.products[0]' data/products.json)

          NAME=$(echo "$PRODUCT" | jq -r '.name')
          LINK=$(echo "$PRODUCT" | jq -r '.link')

          echo "Processing: $NAME"

          # ----------------------------
          # 2. Remove first product (queue system)
          # ----------------------------
          jq 'del(.products[0])' data/products.json > tmp.json && mv tmp.json data/products.json

          # ----------------------------
          # 3. Create page folder
          # ----------------------------
          LAST=$(find . -maxdepth 1 -type d -name "page*" | sed 's|^\./page||' | sort -n | tail -n 1)
          if [ -z "$LAST" ]; then
            NEXT=1
          else
            NEXT=$((LAST + 1))
          fi

          mkdir -p "page$NEXT"

          # ----------------------------
          # 4. Gemini prompt
          # ----------------------------
          PROMPT="Return ONLY valid HTML (no markdown).

          Create a high-converting affiliate review page.

          Product name: $NAME
          Affiliate link: $LINK

          Requirements:
          - SEO optimized title
          - strong H1
          - product image section (you may use placeholder if unknown)
          - sections:
            * overview
            * who it is for
            * pros and cons
            * benefits
            * FAQ
            * final verdict
          - include ONE CTA button linking to affiliate link
          - persuasive but honest tone
          - mobile friendly design"

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{
              \"contents\": [
                {
                  \"parts\": [
                    { \"text\": \"$PROMPT\" }
                  ]
                }
              ]
            }" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent")

          HTML=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          # fallback if AI fails
          if [ -z "$HTML" ]; then
            HTML="<!DOCTYPE html><html><head><title>$NAME</title></head><body><h1>$NAME</h1><a href='$LINK'>Buy on Amazon</a></body></html>"
          fi

          echo "$HTML" > "page$NEXT/index.html"

          # ----------------------------
          # 5. Rebuild homepage index
          # ----------------------------
          cat > index.html <<EOF
<!DOCTYPE html>
<html>
<head>
  <title>Affiliate Pages</title>
</head>
<body>
<h1>Affiliate Product Pages</h1>
<ul>
EOF

          for dir in page*; do
            if [ -d "$dir" ]; then
              TITLE=$(grep -o '<title>[^<]*' "$dir/index.html" 2>/dev/null | head -n 1 | sed 's/<title>//' || true)
              [ -z "$TITLE" ] && TITLE="$dir"
              echo "<li><a href='$dir/'>$TITLE</a></li>" >> index.html
            fi
          done

          cat >> index.html <<EOF
</ul>
</body>
</html>
EOF

          # ----------------------------
          # 6. Commit changes
          # ----------------------------
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/products.json index.html page*
          git commit -m "Generate affiliate page for $NAME" || echo "No changes"
          git push
